<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Trip - 櫻花行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #FFF5F7; color: #4A4A4A; }
        .header-banner { height: 180px; background: linear-gradient(180deg, #FFD1DC 0%, #FFB7C5 100%); position: relative; }
        .header-curve { position: absolute; bottom: 0; width: 100%; height: 30px; background: #FFF5F7; border-radius: 30px 30px 0 0; }
        .active-tab { background-color: #FFB7C5 !important; color: white !important; transform: scale(1.1); }
        .active-date { background-color: #FFB7C5; color: white; }
        .modal-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        input, select, textarea { border: 1px solid #FFD1DC !important; border-radius: 12px !important; padding: 10px !important; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-inner">
        
        <header class="header-banner flex items-center justify-center">
            <h1 class="text-3xl font-bold text-white tracking-widest uppercase">Seoul Trip</h1>
            <nav class="absolute bottom-4 right-4 flex space-x-2 z-20">
                <button v-for="t in tabs" @click="activeTab = t.id" :class="['p-3 rounded-2xl bg-white text-pink-300 shadow-sm transition-all', activeTab === t.id ? 'active-tab' : '']">
                    <i :data-lucide="t.icon" class="w-5 h-5"></i>
                </button>
            </nav>
            <div class="header-curve"></div>
        </header>

        <main class="px-4 pb-24 -mt-4 relative z-10">
            <div v-if="activeTab === 'itinerary'">
                <div class="flex overflow-x-auto space-x-3 mb-6 py-2 no-scrollbar">
                    <button v-for="d in days" @click="selectedDay = d.id" :class="['flex-shrink-0 w-14 h-16 rounded-2xl flex flex-col items-center justify-center bg-white text-gray-400 shadow-sm transition-all', selectedDay === d.id ? 'active-date' : '']">
                        <span class="text-[10px] font-bold">{{ d.weekday }}</span>
                        <span class="text-lg font-bold">{{ d.date }}</span>
                    </button>
                </div>

                <div class="space-y-4">
                    <div v-for="(item, index) in currentDayItems" :key="item.id" class="bg-white p-4 rounded-3xl shadow-sm border-l-4 border-pink-200 relative">
                        <div class="flex justify-between" @click="openGoogleMap(item.name)">
                            <div>
                                <span class="text-[10px] bg-pink-50 text-pink-400 px-2 py-0.5 rounded-full">{{ item.category }}</span>
                                <h3 class="font-bold text-gray-700 mt-1">{{ item.name }}</h3>
                                <p class="text-xs text-gray-400 mt-1"><i class="inline-block w-3 h-3 mr-1">🕒</i>{{ item.time || '未填寫時間' }}</p>
                            </div>
                            <button @click.stop="editItem(item)" class="text-gray-300"><i data-lucide="more-horizontal"></i></button>
                        </div>
                    </div>
                </div>

                <button @click="showAddModal = true" class="fixed bottom-6 right-6 w-14 h-14 bg-pink-400 text-white rounded-full shadow-lg flex items-center justify-center z-50">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>

            <div v-if="activeTab === 'info'" class="space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm">
                    <h3 class="font-bold text-pink-400 mb-3">匯率換算 (KRW -> TWD)</h3>
                    <input type="number" v-model="exchangeInput" placeholder="輸入韓幣">
                    <p class="mt-2 text-right font-bold text-gray-500">約 NT$ {{ Math.round(exchangeInput * 0.024) }}</p>
                </div>
            </div>

            <div v-if="activeTab === 'shopping'">
                <div class="grid grid-cols-2 gap-3">
                    <div v-for="s in shoppingList" class="bg-white p-3 rounded-2xl shadow-sm">
                        <p class="text-sm font-medium">{{ s.name }}</p>
                    </div>
                </div>
                <button @click="addItemToShopping" class="fixed bottom-6 right-6 w-14 h-14 bg-pink-400 text-white rounded-full shadow-lg flex items-center justify-center z-50">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
        </main>

        <div v-if="showAddModal" class="fixed inset-0 modal-bg z-[100] flex items-end">
            <div class="bg-white w-full rounded-t-[40px] p-8 animate-slide-up">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-700">{{ isEditing ? '編輯行程' : '新增行程' }}</h2>
                    <button @click="closeModal" class="text-gray-400">取消</button>
                </div>
                
                <div class="space-y-4">
                    <select v-model="form.category">
                        <option>景點</option><option>美食</option><option>購物</option><option>住宿</option><option>航班</option>
                    </select>
                    <input v-model="form.name" placeholder="名稱 (例如：廣藏市場)">
                    <input v-model="form.time" placeholder="時間 (例如：10:30-12:00)">
                    <textarea v-model="form.note" placeholder="備註/特色"></textarea>
                    
                    <button @click="saveItem" class="w-full bg-pink-400 text-white py-4 rounded-2xl font-bold shadow-md">儲存行程</button>
                    <button v-if="isEditing" @click="deleteItem" class="w-full bg-red-50 text-red-400 py-2 rounded-2xl text-sm mt-2">刪除行程</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const activeTab = ref('itinerary');
                const selectedDay = ref(1);
                const showAddModal = ref(false);
                const isEditing = ref(false);
                const exchangeInput = ref(0);

                const tabs = [
                    { id: 'itinerary', icon: 'map-pin' },
                    { id: 'info', icon: 'info' },
                    { id: 'shopping', icon: 'shopping-basket' },
                    { id: 'expense', icon: 'banknote' }
                ];

                const days = [
                    { id: 1, weekday: 'Wed', date: '4/1' }, { id: 2, weekday: 'Thu', date: '4/2' },
                    { id: 3, weekday: 'Fri', date: '4/3' }, { id: 4, weekday: 'Sat', date: '4/4' },
                    { id: 5, weekday: 'Sun', date: '4/5' }, { id: 6, weekday: 'Mon', date: '4/6' }
                ];

                // 從本地儲存讀取資料
                const items = ref(JSON.parse(localStorage.getItem('seoul_items')) || [
                    { id: Date.now(), dayId: 1, category: '美食', name: '傳聞中的聖水馬鈴薯排骨湯', time: '12:00', note: '' }
                ]);
                
                const shoppingList = ref(JSON.parse(localStorage.getItem('seoul_shopping')) || []);

                const form = ref({ id: null, dayId: 1, category: '景點', name: '', time: '', note: '' });

                const currentDayItems = computed(() => items.value.filter(i => i.dayId === selectedDay.value));

                const saveItem = () => {
                    if (!form.value.name) return alert('請輸入名稱');
                    
                    if (isEditing.value) {
                        const index = items.value.findIndex(i => i.id === form.value.id);
                        items.value[index] = { ...form.value };
                    } else {
                        items.value.push({ ...form.value, id: Date.now(), dayId: selectedDay.value });
                    }
                    
                    localStorage.setItem('seoul_items', JSON.stringify(items.value));
                    closeModal();
                };

                const editItem = (item) => {
                    form.value = { ...item };
                    isEditing.value = true;
                    showAddModal.value = true;
                };

                const deleteItem = () => {
                    if (confirm('確定要刪除嗎？')) {
                        items.value = items.value.filter(i => i.id !== form.value.id);
                        localStorage.setItem('seoul_items', JSON.stringify(items.value));
                        closeModal();
                    }
                };

                const closeModal = () => {
                    showAddModal.value = false;
                    isEditing.value = false;
                    form.value = { id: null, dayId: 1, category: '景點', name: '', time: '', note: '' };
                    nextTick(() => lucide.createIcons());
                };

                const openGoogleMap = (name) => {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' Seoul')}`, '_blank');
                };

                const addItemToShopping = () => {
                    const name = prompt('想要買什麼？');
                    if (name) {
                        shoppingList.value.push({ name });
                        localStorage.setItem('seoul_shopping', JSON.stringify(shoppingList.value));
                    }
                };

                onMounted(() => {
                    lucide.createIcons();
                });

                return {
                    activeTab, tabs, days, selectedDay, items, currentDayItems, 
                    showAddModal, form, saveItem, editItem, isEditing, closeModal, deleteItem,
                    openGoogleMap, exchangeInput, shoppingList, addItemToShopping
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
